name: Release APK

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.11'

      - name: Make Gradle executable
        run: chmod +x ./gradlew

      - name: Check for Signing Keys
        id: check_keys
        run: |
          if [ -n "${{ secrets.RELEASE_KEYSTORE_BASE64 }}" ]; then
            echo "HAS_SIGNING_KEYS=true" >> $GITHUB_ENV
          else
            echo "HAS_SIGNING_KEYS=false" >> $GITHUB_ENV
          fi

      - name: Extract Keystore
        if: env.HAS_SIGNING_KEYS == 'true'
        run: |
          echo "${{ secrets.RELEASE_KEYSTORE_BASE64 }}" | base64 -d > release.jks

      - name: Build release APK
        run: gradle assembleRelease
        env:
          RELEASE_KEYSTORE_PATH: ${{ github.workspace }}/release.jks
          RELEASE_KEYSTORE_PASSWORD: ${{ secrets.RELEASE_KEYSTORE_PASSWORD }}
          RELEASE_KEY_ALIAS: ${{ secrets.RELEASE_KEY_ALIAS }}
          RELEASE_KEY_PASSWORD: ${{ secrets.RELEASE_KEY_PASSWORD }}

      - name: Download ADB platform-tools (Windows & Mac)
        run: |
          # Windows
          wget -q https://dl.google.com/android/repository/platform-tools-latest-windows.zip -O /tmp/platform-tools-windows.zip
          mkdir -p /tmp/adb-win
          unzip -q /tmp/platform-tools-windows.zip 'platform-tools/adb.exe' 'platform-tools/AdbWinApi.dll' 'platform-tools/AdbWinUsbApi.dll' -d /tmp/adb-win/ || true
          unzip -q /tmp/platform-tools-windows.zip 'platform-tools/adb.exe' -d /tmp/adb-win/ 2>/dev/null || true

          # Mac
          wget -q https://dl.google.com/android/repository/platform-tools-latest-darwin.zip -O /tmp/platform-tools-macos.zip
          mkdir -p /tmp/adb-mac
          unzip -q /tmp/platform-tools-macos.zip 'platform-tools/adb' -d /tmp/adb-mac/

      - name: Ensure installer scripts have correct line endings/BOM
        run: |
          # install.ps1 needs UTF-8 BOM for some Windows systems
          python3 -c "p='installer/install.ps1';d=open(p,'rb').read();open(p,'wb').write(d if d[:3]==b'\xef\xbb\xbf' else b'\xef\xbb\xbf'+d)"
          # install.sh should have LF line endings
          sed -i 's/\r$//' installer/install.sh

      - name: Bundle Installers
        run: |
          TAG="${{ github.ref_name }}"
          APK=$(find app/build/outputs/apk/release -name "*.apk" | head -1)
          APK_NAME=$(basename "$APK")

          # --- Windows Bundle ---
          WIN_DIR="bundle-win"
          mkdir -p "$WIN_DIR/adb"
          cp /tmp/adb-win/platform-tools/adb.exe "$WIN_DIR/adb/"
          cp /tmp/adb-win/platform-tools/AdbWinApi.dll "$WIN_DIR/adb/" 2>/dev/null || true
          cp /tmp/adb-win/platform-tools/AdbWinUsbApi.dll "$WIN_DIR/adb/" 2>/dev/null || true
          cp "$APK" "$WIN_DIR/"
          cp installer/install.bat "$WIN_DIR/"
          cp installer/install.ps1 "$WIN_DIR/"
          (cd "$WIN_DIR" && zip -r "../scrcpy-web-${TAG}-windows-installer.zip" .)

          # --- macOS Bundle ---
          MAC_DIR="bundle-mac"
          mkdir -p "$MAC_DIR/adb"
          cp /tmp/adb-mac/platform-tools/adb "$MAC_DIR/adb/adb_mac"
          chmod +x "$MAC_DIR/adb/adb_mac"
          cp "$APK" "$MAC_DIR/"
          cp installer/install.sh "$MAC_DIR/"
          chmod +x "$MAC_DIR/install.sh"
          (cd "$MAC_DIR" && zip -r "../scrcpy-web-${TAG}-macos-installer.zip" .)

          echo "WIN_ZIP=scrcpy-web-${TAG}-windows-installer.zip" >> $GITHUB_ENV
          echo "MAC_ZIP=scrcpy-web-${TAG}-macos-installer.zip" >> $GITHUB_ENV
          echo "APK_PATH=$APK" >> $GITHUB_ENV

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ${{ env.APK_PATH }}
            ${{ env.WIN_ZIP }}
            ${{ env.MAC_ZIP }}
          generate_release_notes: true
          body: |
            ## Installation

            ### Option A — Guided Installer (Recommended)

            **Windows**:
            1. Download `${{ env.WIN_ZIP }}`
            2. Extract and double-click `install.bat`

            **macOS**:
            1. Download `${{ env.MAC_ZIP }}`
            2. Extract, open Terminal in the folder, and run:
               ```bash
               chmod +x install.sh && ./install.sh
               ```

            > Supports: English, Korean, Japanese, Chinese, Spanish.
            > Requires Android 11+ for wireless debugging. No USB cable needed.

            ### Option B — Manual APK Install
            Download the `.apk` file and sideload it manually.

            ---
            See [Installation Guide](https://github.com/${{ github.repository }}/blob/main/docs/installation.md) for detailed instructions.
